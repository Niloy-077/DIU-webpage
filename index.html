<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daffodil International University</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <!-- Logo and Title Section -->
        <div class="header">
<img src="logo.png" alt="DIU Logo" class="diu-logo">
         
        </div>

        <!-- Table Section with Text Input Boxes -->
        <div class="section">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Roll</th>
                        <th>Age</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" placeholder="e.g., niloy" class="table-input"></td>
                        <td><input type="text" placeholder="Roll No." class="table-input"></td>
                        <td><input type="text" placeholder="Age" class="table-input"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Form Section with Expanded Courses -->
        <div class="section">
            <h2>form ,</h2>
            <form>
                <div class="form-group">
                    <label for="course">Course</label>
                    <select id="course" name="course">
                        <option value="math">Desktop & Web Programming</option>
                        <option value="">Select course...</option>
                        <option value="java">Operating System & System Programming</option>
                        <option value="dbms">Theory of Computing</option>
                        <option value="algo">System Analysis & Design Capstone Project</option>
                    </select>
                </div>
                
                <div class="form,">
                    <label for="language">Language</label>
                    <select id="language" name="language">
                        <option value="">Select language...</option>
                        <option value="english">English</option>
                        <option value="bengali">Bengali</option>
                    </select>
                </div>
            </form>
        </div>

    </div>

</body>
</html>
